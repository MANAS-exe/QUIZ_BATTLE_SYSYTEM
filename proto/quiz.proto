syntax = "proto3";

package quiz;

option go_package = "github.com/yourorg/quiz-battle/proto/quiz";


// ─────────────────────────────────────────────────────────────
// SERVICE 0 — AuthService
// ─────────────────────────────────────────────────────────────

service AuthService {
  rpc Register (AuthRequest) returns (AuthResponse);
  rpc Login    (AuthRequest) returns (AuthResponse);
}

message AuthRequest {
  string username = 1;
  string password = 2;
}

message AuthResponse {
  bool   success  = 1;
  string token    = 2;   // JWT
  string user_id  = 3;
  string username = 4;
  string message  = 5;   // error or info message
  int32  rating   = 6;
}

// ─────────────────────────────────────────────────────────────
// ENUMS
// ─────────────────────────────────────────────────────────────

enum Difficulty {
  DIFFICULTY_UNSPECIFIED = 0;
  EASY                   = 1;
  MEDIUM                 = 2;
  HARD                   = 3;
}

enum MatchState {
  MATCH_STATE_UNSPECIFIED = 0;
  WAITING                 = 1;
  IN_PROGRESS             = 2;
  FINISHED                = 3;
}

enum PlayerStatus {
  PLAYER_STATUS_UNSPECIFIED = 0;
  CONNECTED                 = 1;
  DISCONNECTED              = 2;
  RECONNECTING              = 3;
}

// ─────────────────────────────────────────────────────────────
// COMMON MESSAGES
// ─────────────────────────────────────────────────────────────

message Player {
  string user_id   = 1;
  string username  = 2;
  int32  rating    = 3;
  PlayerStatus status = 4;
}

message Question {
  string     question_id       = 1;
  string     text              = 2;
  repeated string options      = 3;   // always 4 options
  Difficulty difficulty        = 4;
  string     topic             = 5;
  int32      time_limit_ms     = 6;   // per-question timer based on avgResponseTimeMs
}

message PlayerScore {
  string user_id          = 1;
  string username         = 2;
  int32  score            = 3;
  int32  rank             = 4;
  int32  answers_correct  = 5;
  int32  avg_response_ms  = 6;
  bool   is_connected     = 7;
}

// ─────────────────────────────────────────────────────────────
// SERVICE 1 — MatchmakingService
// ─────────────────────────────────────────────────────────────

service MatchmakingService {
  // Player joins the matchmaking pool
  rpc JoinMatchmaking  (JoinRequest)      returns (JoinResponse);
  // Player cancels matchmaking before a room is found
  rpc LeaveMatchmaking (LeaveRequest)     returns (LeaveResponse);
  // Long-lived stream — server pushes match events (room found, player joined, etc.)
  rpc SubscribeToMatch (SubscribeRequest) returns (stream MatchEvent);
}

// JoinMatchmaking
message JoinRequest {
  string user_id  = 1;
  string username = 2;
  int32  rating   = 3;
}

message JoinResponse {
  bool   success = 1;
  string message = 2;         // e.g. "Added to pool, waiting for players..."
  string queue_position = 3;  // informational ETA hint for the UI
}

// LeaveMatchmaking
message LeaveRequest {
  string user_id = 1;
}

message LeaveResponse {
  bool   success = 1;
  string message = 2;
}

// SubscribeToMatch — streamed events back to Flutter
message SubscribeRequest {
  string user_id = 1;
}

message MatchEvent {
  oneof event {
    MatchFound       match_found    = 1;
    MatchCancelled   match_cancelled = 2;
    WaitingUpdate    waiting_update  = 3;
  }
}

message MatchFound {
  string     room_id      = 1;
  repeated Player players = 2;
  int32  total_rounds     = 3;
}

message MatchCancelled {
  string reason = 1;  // "timeout" | "not_enough_players"
}

message WaitingUpdate {
  int32           players_in_pool = 1;
  int32           estimated_wait_seconds = 2;
  repeated Player players = 3;   // players currently waiting in the pool
}

// ─────────────────────────────────────────────────────────────
// SERVICE 2 — QuizService
// ─────────────────────────────────────────────────────────────

service QuizService {
  // Fetch all questions for a room (called once after match is found)
  rpc GetRoomQuestions (RoomRequest)    returns (QuestionsResponse);
  // Player submits an answer for the current round
  rpc SubmitAnswer     (AnswerRequest)  returns (AnswerAck);
  // Long-lived stream — server pushes questions, round results, leaderboard, match end
  rpc StreamGameEvents (StreamRequest) returns (stream GameEvent);
}

// GetRoomQuestions
message RoomRequest {
  string room_id = 1;
  string user_id = 2;
}

message QuestionsResponse {
  string            room_id   = 1;
  repeated Question questions = 2;
  int32             total_rounds = 3;
}

// SubmitAnswer
message AnswerRequest {
  string room_id      = 1;
  string user_id      = 2;
  int32  round_number = 3;
  string question_id  = 4;
  int32  answer_index = 5;              // 0–3 matching options array
  int64  submitted_at_ms = 6;           // client epoch ms — used for speed scoring
}

message AnswerAck {
  bool   received    = 1;
  string message     = 2;  // "Answer recorded" | "Too late" | "Already submitted"
}

// StreamGameEvents
message StreamRequest {
  string room_id = 1;
  string user_id = 2;
}

// GameEvent — the core real-time envelope sent to every Flutter client
message GameEvent {
  oneof event {
    QuestionBroadcast question     = 1;
    LeaderboardUpdate leaderboard  = 2;
    RoundResult       round_result = 3;
    MatchEnd          match_end    = 4;
    PlayerJoined      player_joined = 5;
    TimerSync         timer_sync   = 6;
  }
}

// Sent at the start of each round — shows the question + starts countdown
message QuestionBroadcast {
  int32    round_number = 1;
  Question question     = 2;
  int64    deadline_ms  = 3;  // absolute epoch ms when round closes
}

// Sent after every score update — refreshes the leaderboard overlay
message LeaderboardUpdate {
  string                room_id = 1;
  int32                 round_number = 2;
  repeated PlayerScore  scores  = 3;
}

// Sent after all answers are in (or timer expires) for a round
message RoundResult {
  int32               round_number   = 1;
  string              question_id    = 2;
  int32               correct_index  = 3;   // revealed to clients after round ends
  repeated PlayerScore scores        = 4;
  string              fastest_user_id = 5;  // who answered fastest
  string              correct_answer_text = 6; // the actual answer text
  string              fastest_username = 7;    // display name of fastest
}

// Sent once at the very end of the match
message MatchEnd {
  string               room_id         = 1;
  string               winner_user_id  = 2;
  string               winner_username = 3;
  repeated PlayerScore final_scores    = 4;
  int32                total_rounds    = 5;
  int32                duration_seconds = 6;
}

// Sent when a new player connects or reconnects mid-match
message PlayerJoined {
  Player player      = 1;
  int32  round_number = 2;   // current round so late joiner can catch up
  MatchState state   = 3;
}

// Sent periodically to keep client clocks in sync with server
message TimerSync {
  int32  round_number  = 1;
  int64  server_time_ms = 2;  // server epoch ms — client computes drift offset
  int64  deadline_ms   = 3;   // when current round closes
}

// ─────────────────────────────────────────────────────────────
// SERVICE 3 — ScoringService
// ─────────────────────────────────────────────────────────────

service ScoringService {
  // Called by scoring worker after consuming answer.submitted from RabbitMQ
  rpc CalculateScore  (ScoreRequest)       returns (ScoreResponse);
  // Called by Flutter or other services to fetch current leaderboard
  rpc GetLeaderboard  (LeaderboardRequest) returns (LeaderboardResponse);
}

// CalculateScore
message ScoreRequest {
  string room_id        = 1;
  string user_id        = 2;
  int32  round_number   = 3;
  string question_id    = 4;
  int32  answer_index   = 5;
  int64  submitted_at_ms = 6;
  int64  round_started_at_ms = 7;  // used to compute response time for speed bonus
}

message ScoreResponse {
  bool   is_correct      = 1;
  int32  points_awarded  = 2;   // base + speed bonus
  int32  total_score     = 3;   // cumulative score for this player in this room
  int32  speed_bonus     = 4;   // extra points for fast answer
  int32  new_rank        = 5;   // rank after this score update
}

// GetLeaderboard
message LeaderboardRequest {
  string room_id = 1;
}

message LeaderboardResponse {
  string               room_id      = 1;
  int32                round_number = 2;
  repeated PlayerScore scores       = 3;
}