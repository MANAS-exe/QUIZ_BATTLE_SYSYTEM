services:

  # ── Infrastructure ────────────────────────────────────────────

  mongodb:
    image: mongo:7
    container_name: quiz_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: quiz_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: quiz_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Application Services ──────────────────────────────────────

  matchmaking-service:
    build:
      context: .
      dockerfile: matchmaking-service/Dockerfile
    container_name: quiz_matchmaking
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      GRPC_ADDR: ":50051"
      GRPC_WEB_ADDR: ":8080"
      REDIS_ADDR: "redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      MONGO_URI: "mongodb://mongodb:27017"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
    depends_on:
      mongodb:  { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  quiz-service:
    build:
      context: .
      dockerfile: quiz-service/Dockerfile
    container_name: quiz_engine
    ports:
      - "50052:50052"
    environment:
      GRPC_ADDR: ":50052"
      REDIS_ADDR: "redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      MONGO_URI: "mongodb://mongodb:27017"
    depends_on:
      mongodb:  { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  scoring-service:
    build:
      context: .
      dockerfile: scoring-service/Dockerfile
    container_name: quiz_scoring
    ports:
      - "50053:50053"
    environment:
      GRPC_ADDR: ":50053"
      REDIS_ADDR: "redis:6379"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      MONGO_URI: "mongodb://mongodb:27017"
    depends_on:
      mongodb:  { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  notification-worker:
    build:
      context: .
      dockerfile: notification-worker/Dockerfile
    container_name: quiz_notification_worker
    env_file:
      - notification-worker/.env
    environment:
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      MONGO_URI: "mongodb://mongodb:27017"
    depends_on:
      mongodb:  { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: quiz_payment
    ports:
      - "8081:8081"
    environment:
      PORT: ":8081"
      MONGO_URI: "mongodb://mongodb:27017"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      RAZORPAY_KEY_ID: "${RAZORPAY_KEY_ID}"
      RAZORPAY_KEY_SECRET: "${RAZORPAY_KEY_SECRET}"
    depends_on:
      mongodb:  { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

volumes:
  mongo-data:
    name: mongo-data
  redis-data:
    name: redis-data
